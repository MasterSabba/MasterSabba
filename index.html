<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterSabba Hub</title>
    
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-orange: #ff9800;
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --neon-red: #ff073a;
            --neon-yellow: #ffee00;
            --bg-dark: #050505;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.6rem;
            letter-spacing: 5px;
            margin: 25px 0;
            text-shadow: 0 0 15px var(--neon-blue);
            font-weight: 900;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        #gameSearch {
            width: 100%;
            padding: 14px 25px;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        #gameSearch:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,212,255,0.2); }

        .list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 100px;
        }

        .card {
            position: relative;
            background: linear-gradient(90deg, #111 0%, #0a0a0a 100%);
            border-left: 5px solid #333;
            border-radius: 8px;
            padding: 18px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            transition: 0.3s;
            overflow: hidden;
        }

        .uno { border-left-color: var(--neon-blue); }
        .verbum { border-left-color: var(--neon-orange); }
        .key { border-left-color: var(--neon-green); }
        .tris { border-left-color: var(--neon-purple); }
        .murder { border-left-color: var(--neon-red); }
        .sudoku { border-left-color: var(--neon-yellow); }

        .card:active { transform: scale(0.98); background: #1a1a1a; }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 20px;
            box-shadow: 0 0 10px currentColor;
        }

        .info h2 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .info p { margin: 2px 0 0 0; font-size: 0.75rem; color: #777; }

        /* --- STILE CHAT WIDGET --- */
        #chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .chat-button {
            width: 60px;
            height: 60px;
            background: #111;
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-blue);
            transition: 0.3s;
        }

        .chat-window {
            display: none;
            position: absolute;
            bottom: 75px;
            right: 0;
            width: 300px;
            background: #111;
            border: 1px solid var(--neon-blue);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: var(--neon-blue);
            color: black;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-form {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-form input, .chat-form textarea, .chat-form select {
            background: #050505;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: inherit;
            outline: none;
        }

        .chat-form input:focus { border-color: var(--neon-blue); }

        .chat-form button {
            background: var(--neon-blue);
            border: none;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }

        .chat-form button:active { transform: scale(0.95); opacity: 0.8; }

        #status-msg {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 5px;
            display: none;
        }

    </style>
</head>
<body>

    <h1>MASTER HUB</h1>

    <div class="search-box">
        <input type="text" id="gameSearch" placeholder="CERCA UN GIOCO..." oninput="filter()">
    </div>

    <div class="list" id="gameList">
        <a href="https://mastersabba.github.io/MasterUno/" class="card uno">
            <div class="dot" style="color: var(--neon-blue); background: var(--neon-blue);"></div>
            <div class="info"><h2>MasterUno</h2><p>Sfida all'ultima carta</p></div>
        </a>

        <a href="https://mastersabba.github.io/MasterVerbum/" class="card verbum">
            <div class="dot" style="color: var(--neon-orange); background: var(--neon-orange);"></div>
            <div class="info"><h2>MasterVerbum</h2><p>Dizionario e velocità</p></div>
        </a>

        <a href="https://mastersabba.github.io/MasterKey/" class="card key">
            <div class="dot" style="color: var(--neon-green); background: var(--neon-green);"></div>
            <div class="info"><h2>MasterKey</h2><p>Logica e codici segreti</p></div>
        </a>

        <a href="https://mastersabba.github.io/MasterTris/" class="card tris">
            <div class="dot" style="color: var(--neon-purple); background: var(--neon-purple);"></div>
            <div class="info"><h2>MasterTris</h2><p>Strategia 1vs1</p></div>
        </a>

        <a href="https://mastersabba.github.io/MasterMurder/" class="card murder">
            <div class="dot" style="color: var(--neon-red); background: var(--neon-red);"></div>
            <div class="info"><h2>MasterMurder</h2><p>Risolvi il caso</p></div>
        </a>

        <a href="https://mastersabba.github.io/MasterSudoku/" class="card sudoku">
            <div class="dot" style="color: var(--neon-yellow); background: var(--neon-yellow);"></div>
            <div class="info"><h2>MasterSudoku</h2><p>Numeri e precisione</p></div>
        </a>
    </div>

    <div id="chat-widget">
        <div class="chat-window" id="chatWin">
            <div class="chat-header">
                <span>MASTER BOT </span>
                <span style="cursor:pointer; font-size: 1.5rem;" onclick="toggleChat()">×</span>
            </div>
            
            <form class="chat-form" id="masterForm">
                <input type="email" name="email" placeholder="La tua Email Gmail" required>
                <select name="subject">
                    <option value="Assistenza">Assistenza Tecnica</option>
                    <option value="Consiglio">Consiglio Gioco</option>
                    <option value="Recensione">Recensione Hub</option>
                </select>
                <textarea name="message" rows="4" placeholder="Come posso aiutarti?" required></textarea>
                <button type="submit" id="submitBtn">INVIA MESSAGGIO</button>
                <div id="status-msg"></div>
            </form>
        </div>

        <div class="chat-button" onclick="toggleChat()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="var(--neon-blue)">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
        </div>
    </div>

    <script>
        // Funzione Filtro Giochi
        function filter() {
            let val = document.getElementById('gameSearch').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(val) ? "flex" : "none";
            });
        }

        // Toggle Finestra Chat
        function toggleChat() {
            const win = document.getElementById('chatWin');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        // Gestione Invio Form (Senza ricaricare la pagina)
        const form = document.getElementById("masterForm");
        const status = document.getElementById("status-msg");

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "INVIANDO...";

            const data = new FormData(e.target);
            
            try {
                const response = await fetch("https://formspree.io/f/xbdzvell", {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    status.style.display = "block";
                    status.style.color = "var(--neon-green)";
                    status.innerText = "Messaggio inviato con successo!";
                    form.reset();
                    setTimeout(() => { toggleChat(); status.style.display = "none"; }, 2000);
                } else {
                    throw new Error();
                }
            } catch (error) {
                status.style.display = "block";
                status.style.color = "var(--neon-red)";
                status.innerText = "Errore nell'invio. Riprova.";
            } finally {
                btn.disabled = false;
                btn.innerText = "INVIA MESSAGGIO";
            }
        };
    </script>

</body>
</html>
