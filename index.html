<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterSabba Hub</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-orange: #ff9800;
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --neon-red: #ff073a;
            --bg-dark: #0a0a0a;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 20px 0;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* Barra di Ricerca Neon */
        .search-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        #gameSearch {
            width: 100%;
            padding: 12px 20px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        #gameSearch:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        /* Layout a Griglia */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 colonne su mobile */
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        @media (min-width: 768px) {
            .grid-container { grid-template-columns: repeat(3, 1fr); } /* 3 su tablet/pc */
        }

        .card {
            background: #161616;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 15px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
            text-align: center;
        }

        /* Colori dinamici */
        .card.uno { border-color: var(--neon-blue); }
        .card.verbum { border-color: var(--neon-orange); }
        .card.key { border-color: var(--neon-green); }
        .card.tris { border-color: var(--neon-purple); }
        .card.murder { border-color: var(--neon-red); }

        .card:active { transform: scale(0.95); opacity: 0.8; }

        .card h2 { margin: 10px 0 5px 0; font-size: 1rem; }
        .card p { font-size: 0.7rem; color: #888; margin: 0; }

        .stats { margin-top: 50px; font-size: 0.7rem; color: #333; }
    </style>
</head>
<body>

    <h1>MASTER HUB</h1>

    <div class="search-container">
        <input type="text" id="gameSearch" placeholder="Cerca un gioco..." onkeyup="filterGames()">
    </div>

    <div class="grid-container" id="gameGrid">
        <a href="https://mastersabba.github.io/MasterUno/" class="card uno" data-name="MasterUno">
            <h2>MasterUno</h2>
            <p>Carte</p>
        </a>

        <a href="https://mastersabba.github.io/MasterVerbum/" class="card verbum" data-name="MasterVerbum">
            <h2>MasterVerbum</h2>
            <p>Parole</p>
        </a>

        <a href="https://mastersabba.github.io/MasterKey/" class="card key" data-name="MasterKey">
            <h2>MasterKey</h2>
            <p>Logica</p>
        </a>

        <a href="https://mastersabba.github.io/MasterTris/" class="card tris" data-name="MasterTris">
            <h2>MasterTris</h2>
            <p>Sfida 1vs1</p>
        </a>

        <a href="https://mastersabba.github.io/MasterMurder/" class="card murder" data-name="MasterMurder">
            <h2>MasterMurder</h2>
            <p>Mistero</p>
        </a>
    </div>

    <div class="stats">MasterSabba Project © 2026</div>

    <script>
        function filterGames() {
            let input = document.getElementById('gameSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('card');

            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getAttribute('data-name').toLowerCase();
                if (name.includes(input)) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
